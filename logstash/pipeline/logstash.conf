input {
  # Accept logs from Filebeat / agents on port 5044
  beats {
    port => 5044
  }

  # Accept raw log lines via TCP (for direct application shipping)
  tcp {
    port => 5000
    codec => json_lines
    type => "application"
  }

  # Read log files from mounted volume (simulated app logs)
  file {
    path => "/var/log/sample-logs/*.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    type => "file-input"
  }
}

filter {
  # Parse Nginx access log format
  if [type] == "nginx-access" {
    grok {
      match => {
        "message" => '%{IPORHOST:client_ip} - %{DATA:user} \[%{HTTPDATE:timestamp}\] "%{WORD:http_method} %{DATA:request_uri} HTTP/%{NUMBER:http_version}" %{NUMBER:response_code:int} %{NUMBER:response_bytes:int} "%{DATA:referrer}" "%{DATA:user_agent}"'
      }
    }
    date {
      match => ["timestamp", "dd/MMM/yyyy:HH:mm:ss Z"]
      target => "@timestamp"
    }
    # Classify HTTP response codes
    if [response_code] >= 500 {
      mutate { add_field => { "log_level" => "ERROR" } }
    } else if [response_code] >= 400 {
      mutate { add_field => { "log_level" => "WARN" } }
    } else {
      mutate { add_field => { "log_level" => "INFO" } }
    }
  }

  # Parse application JSON logs
  if [type] == "application" {
    json {
      source => "message"
    }
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
    }
  }

  # Enrich with GeoIP if client IP is present
  if [client_ip] {
    geoip {
      source => "client_ip"
      target => "geoip"
    }
  }

  # Remove redundant fields
  mutate {
    remove_field => ["host", "message", "beat", "offset", "prospector", "source"]
  }
}

output {
  # Index into Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "app-logs-%{+YYYY.MM.dd}"
    action => "index"
  }

  # Also output to Logstash stdout for debugging (comment out in production)
  stdout {
    codec => rubydebug
  }
}
