version: '3.8'

services:
  # =============================================================================
  # ELASTICSEARCH — Central search and analytics engine
  # =============================================================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false         # Disabled for local dev simplicity
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - elk-network
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\\|yellow\"'"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # =============================================================================
  # LOGSTASH — Log ingestion, parsing, and enrichment pipeline
  # =============================================================================
  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.0
    container_name: logstash
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
      - ./sample-logs:/var/log/sample-logs:ro
    ports:
      - "5044:5044"    # Beats input
      - "5000:5000/tcp"  # TCP input (raw syslog)
      - "5000:5000/udp"  # UDP input
      - "9600:9600"    # Logstash monitoring API
    environment:
      - LS_JAVA_OPTS=-Xms256m -Xmx256m
    networks:
      - elk-network
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  # =============================================================================
  # KIBANA — Visualization and dashboards
  # =============================================================================
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    networks:
      - elk-network
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:5601/api/status | grep -q '\"level\":\"available\"'"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # =============================================================================
  # LOG GENERATOR — Simulates application and access log streams
  # =============================================================================
  log-generator:
    build:
      context: ./log-generator
      dockerfile: Dockerfile
    container_name: log-generator
    volumes:
      - ./sample-logs:/var/log/app:rw
    networks:
      - elk-network
    depends_on:
      - logstash
    restart: unless-stopped

networks:
  elk-network:
    driver: bridge

volumes:
  elasticsearch_data:
